@if (authService.isLoggedIn()) {
<header class="app-header">
    <div class="header-content">
        <div class="header-title">
            <h1>{{ pageTitle }}</h1>
        </div>
        @if (user?.role === 'client' || user?.role === 'boutique') {
          <div class="header-actions">
            <app-notification-bell></app-notification-bell>
          </div>
        }
    </div>
</header>
}
