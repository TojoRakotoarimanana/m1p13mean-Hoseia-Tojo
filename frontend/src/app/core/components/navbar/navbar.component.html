@if (authService.isLoggedIn()) {
  <!-- Hamburger toggle (mobile only) -->
  <button class="sidebar-toggle" (click)="toggleSidebar()" aria-label="Ouvrir le menu" [class.sidebar-toggle--hidden]="sidebarOpen()">
    <i class="pi pi-bars"></i>
  </button>

  <!-- Backdrop overlay (mobile only) -->
  <div class="sidebar-backdrop" [class.sidebar-backdrop--visible]="sidebarOpen()" (click)="closeSidebar()"></div>

  <div class="sidebar" [class.sidebar--open]="sidebarOpen()">
    <div class="sidebar-header">
      <div class="logo-container" (click)="navigateToHome()">
        <i class="pi pi-shopping-bag logo-icon"></i>
        <div class="logo-text">
          <h2 class="app-name">Mall Center</h2>
          <span class="app-subtitle">Management</span>
        </div>
      </div>
      <button class="sidebar-close-btn" (click)="closeSidebar()" aria-label="Fermer le menu">
        <i class="pi pi-times"></i>
      </button>
    </div>

    <nav class="sidebar-nav">
      <p-menu [model]="items"></p-menu>
    </nav>

    <div class="sidebar-footer">
      @if (user) {
        <div class="user-profile">
          <p-avatar
            [label]="user.firstName?.charAt(0) + user.lastName?.charAt(0)"
            size="normal"
            shape="circle"
            [style]="{'background-color': '#2563eb', 'color': '#ffffff'}">
          </p-avatar>
          <div class="user-details">
            <span class="user-name">{{ user.firstName }} {{ user.lastName }}</span>
            <span class="user-role">{{ user.role }}</span>
          </div>
        </div>
        <p-button
          icon="pi pi-power-off"
          severity="secondary"
          [text]="true"
          label="Déconnexion"
          (onClick)="logout()"
          styleClass="logout-btn">
        </p-button>
      }
    </div>
  </div>
}
