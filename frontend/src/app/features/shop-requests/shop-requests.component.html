<div class="dashboard-wrapper">
  <div class="dashboard-header">
    <div class="header-content">
      <div>
        <h1 class="dashboard-title">Demandes de boutiques</h1>
        <p class="dashboard-subtitle">Gérez les demandes de création de nouvelles boutiques</p>
      </div>
      <div class="header-actions">
        <p-button 
          label="Actualiser" 
          icon="pi pi-refresh" 
          [outlined]="true"
          size="small"
          (onClick)="loadPending()">
        </p-button>
      </div>
    </div>
  </div>

  <div class="content-section">
    <p-card>
      <ng-template pTemplate="content">
        <p-table 
          [value]="pendingShops" 
          [loading]="loading"
          [paginator]="true" 
          [rows]="10"
          responsiveLayout="scroll"
          styleClass="p-datatable-sm">
          <ng-template pTemplate="header">
            <tr>
              <th>Boutique</th>
              <th>Propriétaire</th>
              <th>Catégorie</th>
              <th style="width: 150px; text-align: center;">Statut</th>
              <th style="width: 120px; text-align: right;">Actions</th>
            </tr>
          </ng-template>
          <ng-template pTemplate="body" let-shop>
            <tr class="data-row">
              <td>
                <div class="flex align-items-center gap-2">
                  <p-avatar 
                    [label]="shop.name?.charAt(0)" 
                    shape="circle"
                    styleClass="bg-indigo-100 text-indigo-700">
                  </p-avatar>
                  <span class="font-medium text-900">{{ shop.name }}</span>
                </div>
              </td>
              <td class="text-600">{{ shop.userId?.email || '-' }}</td>
              <td>
                <p-tag [value]="shop.category?.name || shop.category" severity="info"></p-tag>
              </td>
              <td style="text-align: center;">
                <p-tag 
                  [value]="shop.status" 
                  [severity]="getStatusSeverity(shop.status)">
                </p-tag>
              </td>
              <td style="text-align: right;">
                <div class="flex justify-content-end gap-2">
                  <p-button 
                    icon="pi pi-check" 
                    [rounded]="true" 
                    [text]="true"
                    severity="success" 
                    (onClick)="openApprove(shop)"
                    pTooltip="Approuver">
                  </p-button>
                  <p-button 
                    icon="pi pi-times" 
                    [rounded]="true" 
                    [text]="true"
                    severity="danger" 
                    (onClick)="reject(shop)"
                    pTooltip="Rejeter">
                  </p-button>
                </div>
              </td>
            </tr>
          </ng-template>
          <ng-template pTemplate="emptymessage">
            <tr>
              <td colspan="5" class="empty-state">
                <i class="pi pi-inbox block mb-2" style="font-size: 2rem; opacity: 0.3;"></i>
                <p>Aucune demande en attente.</p>
              </td>
            </tr>
          </ng-template>
        </p-table>
      </ng-template>
    </p-card>
  </div>
</div>

<p-dialog [(visible)]="approveDialog" [modal]="true" [style]="{ width: '450px' }" header="Assigner un emplacement">
  <div class="dialog-body">
    <p class="text-600 mb-4">Veuillez spécifier l'emplacement de la boutique <strong>{{ selectedShop?.name }}</strong>.</p>
    <div class="field">
      <label class="field-label">Étage</label>
      <input pInputText [(ngModel)]="locationForm.floor" class="w-full" placeholder="Ex: RDC, 1er étage..." />
    </div>
    <div class="field">
      <label class="field-label">Zone</label>
      <input pInputText [(ngModel)]="locationForm.zone" class="w-full" placeholder="Ex: Zone A, Nord..." />
    </div>
    <div class="field">
      <label class="field-label">Numéro de boutique</label>
      <input pInputText [(ngModel)]="locationForm.shopNumber" class="w-full" placeholder="Ex: B12" />
    </div>
  </div>

  <ng-template pTemplate="footer">
    <p-button label="Annuler" [text]="true" severity="secondary" (onClick)="approveDialog = false"></p-button>
    <p-button label="Valider et Activer" icon="pi pi-check" (onClick)="approve()"></p-button>
  </ng-template>
</p-dialog>

<p-toast></p-toast>
