<div class="dashboard-wrapper">
  <div class="dashboard-header">
    <div class="header-content">
      <div>
        <h1 class="dashboard-title">Demandes d'inscription (Vendeurs)</h1>
        <p class="dashboard-subtitle">Gérez les demandes de création de compte vendeur</p>
      </div>
      <div class="header-actions">
        <p-button 
          label="Actualiser" 
          icon="pi pi-refresh" 
          [outlined]="true"
          size="small"
          (onClick)="loadPending()">
        </p-button>
      </div>
    </div>
  </div>

  <div class="content-section">
    <p-card>
      <ng-template pTemplate="content">
        <p-table 
          [value]="pendingUsers" 
          [loading]="loading"
          [paginator]="true" 
          [rows]="10"
          responsiveLayout="scroll"
          styleClass="p-datatable-sm">
          <ng-template pTemplate="header">
            <tr>
              <th>Utilisateur</th>
              <th>Email</th>
              <th>Téléphone</th>
              <th style="width: 150px; text-align: center;">Statut</th>
              <th style="width: 120px; text-align: right;">Actions</th>
            </tr>
          </ng-template>
          <ng-template pTemplate="body" let-user>
            <tr class="data-row">
              <td>
                <div class="flex align-items-center gap-2">
                  <p-avatar 
                    [label]="user.firstName?.charAt(0) || user.email?.charAt(0)" 
                    shape="circle"
                    styleClass="bg-blue-100 text-blue-700">
                  </p-avatar>
                  <span class="font-medium text-900">{{ user.firstName }} {{ user.lastName }}</span>
                </div>
              </td>
              <td class="text-600">{{ user.email }}</td>
              <td class="text-600">{{ user.phone || '-' }}</td>
              <td style="text-align: center;">
                <p-tag 
                  [value]="user.isActive ? 'Actif' : 'En attente'" 
                  [severity]="user.isActive ? 'success' : 'warn'">
                </p-tag>
              </td>
              <td style="text-align: right;">
                <div class="flex justify-content-end gap-2">
                  <p-button 
                    icon="pi pi-check" 
                    [rounded]="true" 
                    [text]="true"
                    severity="success" 
                    (onClick)="approve(user)"
                    pTooltip="Approuver">
                  </p-button>
                  <p-button 
                    icon="pi pi-times" 
                    [rounded]="true" 
                    [text]="true"
                    severity="danger" 
                    (onClick)="reject(user)"
                    pTooltip="Rejeter">
                  </p-button>
                </div>
              </td>
            </tr>
          </ng-template>
          <ng-template pTemplate="emptymessage">
            <tr>
              <td colspan="5" class="empty-state">
                <i class="pi pi-inbox block mb-2" style="font-size: 2rem; opacity: 0.3;"></i>
                <p>Aucune demande en attente.</p>
              </td>
            </tr>
          </ng-template>
        </p-table>
      </ng-template>
    </p-card>
  </div>
</div>

<p-toast></p-toast>
