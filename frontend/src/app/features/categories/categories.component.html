<div class="dashboard-wrapper">
  <div class="dashboard-header">
    <div class="header-content">
      <div>
        <h1 class="dashboard-title">Catégories</h1>
        <p class="dashboard-subtitle">Gérez les catégories de boutiques et de produits</p>
      </div>
      <div class="header-actions">
        <p-button 
          label="Nouvelle catégorie" 
          icon="pi pi-plus" 
          (onClick)="openNew()"
          size="small">
        </p-button>
      </div>
    </div>
  </div>

  <div class="content-section">
    <p-card>
      <ng-template pTemplate="content">
        <p-table
          [value]="pagedCategories"
          [loading]="loading"
          responsiveLayout="scroll"
          styleClass="p-datatable-sm">
          <ng-template pTemplate="header">
            <tr>
              <th>Nom</th>
              <th class="col-type">Type</th>
              <th class="col-description">Description</th>
              <th style="width: 100px; text-align: center;">Statut</th>
              <th style="width: 120px; text-align: right;">Actions</th>
            </tr>
          </ng-template>
          <ng-template pTemplate="body" let-category>
            <tr class="data-row">
              <td>
                <div class="flex align-items-center gap-2">
                  <p-avatar
                    [label]="category.name?.charAt(0)"
                    shape="circle"
                    styleClass="bg-purple-100 text-purple-700">
                  </p-avatar>
                  <span class="font-medium text-900">{{ category.name }}</span>
                </div>
              </td>
              <td class="col-type">
                <p-tag [value]="getTypeLabel(category.type)" [severity]="getTypeSeverity(category.type)"></p-tag>
              </td>
              <td class="col-description text-600">{{ category.description || '-' }}</td>
              <td style="text-align: center;">
                <p-tag 
                  [value]="category.isActive ? 'Active' : 'Inactive'" 
                  [severity]="category.isActive ? 'success' : 'danger'">
                </p-tag>
              </td>
              <td style="text-align: right;">
                <div class="flex justify-content-end gap-2">
                  <p-button 
                    icon="pi pi-pencil" 
                    [rounded]="true" 
                    [text]="true"
                    severity="secondary" 
                    (onClick)="editCategory(category)"
                    pTooltip="Modifier">
                  </p-button>
                  <p-button 
                    icon="pi pi-trash" 
                    [rounded]="true" 
                    [text]="true"
                    severity="danger" 
                    (onClick)="deleteCategory(category)"
                    pTooltip="Supprimer">
                  </p-button>
                </div>
              </td>
            </tr>
          </ng-template>
          <ng-template pTemplate="emptymessage">
            <tr>
              <td colspan="5" class="empty-state">
                <i class="pi pi-inbox block mb-2" style="font-size: 2rem; opacity: 0.3;"></i>
                <p>Aucune catégorie trouvée.</p>
              </td>
            </tr>
          </ng-template>
        </p-table>

        <p-paginator
          [rows]="pageSize"
          [totalRecords]="categories.length"
          [rowsPerPageOptions]="[10, 20, 50]"
          (onPageChange)="onPageChange($event)"
          styleClass="p-paginator-sm border-top-1 border-gray-200">
        </p-paginator>
      </ng-template>
    </p-card>
  </div>
</div>

<p-dialog [(visible)]="categoryDialog" [modal]="true" [style]="{ width: '520px' }" [header]="isEdit ? 'Modifier catégorie' : 'Nouvelle catégorie'">
  <div class="dialog-body">
    <div class="field">
      <label class="field-label">Nom</label>
      <input pInputText [(ngModel)]="categoryForm.name" class="w-full" />
    </div>
    <div class="field">
      <label class="field-label">Type</label>
      <p-select
        [options]="typeOptions"
        optionLabel="label"
        optionValue="value"
        [(ngModel)]="categoryForm.type"
        styleClass="w-full">
      </p-select>
    </div>
    <div class="field">
      <label class="field-label">Description</label>
      <input pInputText [(ngModel)]="categoryForm.description" class="w-full" />
    </div>
    <div class="field">
      <label class="field-label">Icône</label>
      <input pInputText [(ngModel)]="categoryForm.icon" class="w-full" />
    </div>
    <div class="field">
      <label class="field-label">Statut</label>
      <p-select
        [options]="[{ label: 'Active', value: true }, { label: 'Inactive', value: false }]"
        optionLabel="label"
        optionValue="value"
        [(ngModel)]="categoryForm.isActive"
        styleClass="w-full">
      </p-select>
    </div>
  </div>

  <ng-template pTemplate="footer">
    <p-button label="Annuler" severity="secondary" (onClick)="categoryDialog = false"></p-button>
    <p-button label="Enregistrer" (onClick)="saveCategory()"></p-button>
  </ng-template>
</p-dialog>

<p-toast></p-toast>
